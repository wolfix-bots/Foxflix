# ── Build settings ───────────────────────────────────────────────────────────
# Builds from repo root so pnpm workspace catalog versions resolve correctly
[build]
  command = "pnpm install && pnpm --filter @workspace/foxy-stream run build"
  publish = "artifacts/foxy-stream/dist"

# ── Environment variables ─────────────────────────────────────────────────────
# Set VITE_API_URL in Netlify dashboard → Site settings → Environment variables
# e.g. https://foxflix-api.onrender.com  (your backend URL)
[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback (client-side routing) ───────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
