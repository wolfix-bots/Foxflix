# Railway: set "Root Directory" to artifacts/foxy-stream in the dashboard
# Build goes up to repo root so pnpm workspace catalog versions resolve
[build]
  builder      = "NIXPACKS"
  buildCommand = "cd ../../ && pnpm install && pnpm --filter @workspace/foxy-stream run build"

[deploy]
  startCommand            = "npx serve artifacts/foxy-stream/dist -l $PORT"
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 5
