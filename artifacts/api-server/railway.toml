# Railway: set "Root Directory" to artifacts/api-server in the dashboard
# Build goes up to repo root so pnpm workspace catalog versions resolve
[build]
  builder      = "NIXPACKS"
  buildCommand = "cd ../../ && pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
  startCommand            = "node artifacts/api-server/dist/index.mjs"
  restartPolicyType       = "ON_FAILURE"
  restartPolicyMaxRetries = 5
