services:
  # ── Backend API (Web Service) ─────────────────────────────────────────────
  # Supports Socket.io for real-time rooms
  - type: web
    name: foxflix-api
    runtime: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: static
    name: foxflix-web
    buildCommand: pnpm install && pnpm --filter @workspace/foxy-stream run build
    staticPublishPath: artifacts/foxy-stream/dist
    envVars:
      # After backend deploys, set this to your Render API URL:
      # e.g. https://foxflix-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
