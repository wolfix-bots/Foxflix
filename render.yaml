services:
  # ── Backend API (Web Service) ─────────────────────────────────────────────
  - type: web
    name: foxflix-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: static
    name: foxflix-web
    rootDir: artifacts/foxy-stream
    buildCommand: pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      # Set this to your Render backend URL, e.g. https://foxflix-api.onrender.com
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
